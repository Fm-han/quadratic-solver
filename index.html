<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一元二次方程求解器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; width: 80px; text-align: center; }
        .equation-input { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .equation-input span { font-size: 1.3rem; }
        .btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; border: none; font-size: 14px; margin-right: 8px; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-gray { background: #6c757d; color: #fff; }
        .result { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-top: 16px; }
        .result-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 12px; }
        .result-item { padding: 8px 0; font-family: monospace; font-size: 1.1rem; }
        .discriminant { background: #e9ecef; padding: 12px; border-radius: 4px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>一元二次方程求解器</h1>
        <div class="card">
            <p style="margin-bottom:16px;color:#666;">求 ax² + bx + c = 0 的解</p>
            <div class="form-group">
                <label>输入系数</label>
                <div class="equation-input">
                    <input type="number" id="a" value="1" step="any">
                    <span>x² +</span>
                    <input type="number" id="b" value="5" step="any">
                    <span>x +</span>
                    <input type="number" id="c" value="6" step="any">
                    <span>= 0</span>
                </div>
            </div>
            <button class="btn btn-blue" onclick="solve()">求解</button>
            <button class="btn btn-gray" onclick="clearCalc()">清空</button>
            <div class="result" id="result" style="display:none;">
                <div class="discriminant" id="discriminant"></div>
                <div id="solutions"></div>
            </div>
        </div>
    </div>
    <script>
        function solve() {
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);
            
            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                alert('请输入有效的数字');
                return;
            }
            
            if (a === 0) {
                // Linear equation
                if (b === 0) {
                    document.getElementById('result').innerHTML = '<div class="result"><strong>这不是一个有效方程</strong></div>';
                } else {
                    const x = -c / b;
                    document.getElementById('result').innerHTML = `<div class="result">
                        <div class="result-title">一次方程 ${b}x + ${c} = 0</div>
                        <div class="result-item">x = ${x.toFixed(6)}</div>
                    </div>`;
                }
                document.getElementById('result').style.display = 'block';
                return;
            }
            
            const discriminant = b * b - 4 * a * c;
            document.getElementById('discriminant').textContent = `判别式 Δ = b² - 4ac = ${b}² - 4×${a}×${c} = ${discriminant}`;
            
            let html = '<div class="result-title">求解结果：</div>';
            
            if (discriminant > 0) {
                const x1 = (-b + Math.sqrt(discriminant)) / (2 * a);
                const x2 = (-b - Math.sqrt(discriminant)) / (2 * a);
                html += `<div class="result-item">x₁ = ${x1.toFixed(6)}</div>`;
                html += `<div class="result-item">x₂ = ${x2.toFixed(6)}</div>`;
            } else if (discriminant === 0) {
                const x = -b / (2 * a);
                html += `<div class="result-item">x = ${x.toFixed(6)} (重根)</div>`;
            } else {
                const realPart = -b / (2 * a);
                const imagPart = Math.sqrt(-discriminant) / (2 * a);
                html += `<div class="result-item">x₁ = ${realPart.toFixed(4)} + ${imagPart.toFixed(4)}i</div>`;
                html += `<div class="result-item">x₂ = ${realPart.toFixed(4)} - ${imagPart.toFixed(4)}i</div>`;
                html += `<div style="color:#666;margin-top:8px;">(两个共轭复根)</div>`;
            }
            
            document.getElementById('solutions').innerHTML = html;
            document.getElementById('result').style.display = 'block';
        }
        
        function clearCalc() {
            document.getElementById('a').value = 1;
            document.getElementById('b').value = 5;
            document.getElementById('c').value = 6;
            document.getElementById('result').style.display = 'none';
        }
    </script>
</body>
</html>
